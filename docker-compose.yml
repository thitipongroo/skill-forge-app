# Local Postgres for development. Start with:  docker compose up -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      - "5432:5432"
    volumes:
      - forge_pgdata:/var/lib/postgresql/data
volumes:
  forge_pgdata:
